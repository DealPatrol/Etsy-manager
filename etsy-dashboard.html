<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Etsy Manager Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --etsy: #F1641E;
    --etsy-dim: rgba(241,100,30,0.15);
    --etsy-glow: rgba(241,100,30,0.35);
    --green: #3ddc84;
    --green-dim: rgba(61,220,132,0.12);
    --yellow: #f5c842;
    --red: #ff5555;
    --text: #f0ede8;
    --text-muted: #666;
    --text-dim: #999;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(241,100,30,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(241,100,30,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
  }

  .logo-badge {
    background: var(--etsy);
    color: white;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* NAV TABS */
  .nav {
    display: flex;
    gap: 2px;
    padding: 16px 32px 0;
    border-bottom: 1px solid var(--border);
  }

  .nav-tab {
    padding: 10px 20px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .nav-tab:hover { color: var(--text-dim); }
  .nav-tab.active {
    color: var(--etsy);
    border-bottom-color: var(--etsy);
  }

  /* MAIN */
  .main { padding: 28px 32px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--etsy);
    opacity: 0.6;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .stat-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .search-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--etsy); }
  .search-box::placeholder { color: var(--text-muted); }

  .btn {
    padding: 10px 18px;
    border-radius: 6px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--etsy);
    color: white;
  }
  .btn-primary:hover { background: #d4551a; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover { border-color: var(--etsy); color: var(--etsy); }

  .btn-green {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
  }
  .btn-green:hover { background: rgba(61,220,132,0.2); }

  .btn-sm {
    padding: 6px 12px;
    font-size: 11px;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: left;
    font-weight: 500;
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(241,100,30,0.03); }

  .listing-title {
    font-weight: 600;
    font-size: 13px;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .listing-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .price {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--green);
  }

  .qty-input {
    width: 64px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    text-align: center;
    outline: none;
  }

  .qty-input:focus { border-color: var(--etsy); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-active { background: var(--green-dim); color: var(--green); border: 1px solid rgba(61,220,132,0.3); }
  .badge-inactive { background: rgba(255,85,85,0.1); color: var(--red); border: 1px solid rgba(255,85,85,0.3); }
  .badge-draft { background: rgba(245,200,66,0.1); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }

  /* SETUP SCREEN */
  .setup-screen {
    max-width: 560px;
    margin: 60px auto;
    text-align: center;
  }

  .setup-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .setup-screen h2 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .setup-screen p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .setup-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    text-align: left;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--etsy); }

  .form-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* BULK ADD */
  .bulk-section {
    max-width: 800px;
  }

  .bulk-section h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }

  .bulk-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }

  .bulk-row-header {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 4px;
  }

  .bulk-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .bulk-input:focus { border-color: var(--etsy); }

  .remove-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--red);
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .remove-btn:hover { background: rgba(255,85,85,0.1); border-color: var(--red); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 480px;
    max-width: 90vw;
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    z-index: 300;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .loading-row td {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--etsy);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .section-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }

  .info-box {
    background: var(--etsy-dim);
    border: 1px solid rgba(241,100,30,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .info-box strong { color: var(--etsy); }

  select.bulk-input {
    cursor: pointer;
    appearance: none;
  }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
    .header { padding: 14px 16px; }
    .nav { padding: 12px 16px 0; }
    .bulk-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── CONFIG ──────────────────────────────────────────────
const STORAGE_KEY = 'etsy_dashboard_config';

function loadConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
}

// ── ETSY API HELPERS ────────────────────────────────────
async function etsyFetch(path, token, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      'x-api-key': loadConfig().apiKey || '',
      'Content-Type': 'application/json',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`https://openapi.etsy.com/v3${path}`, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error_description || err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── OAUTH HELPERS ────────────────────────────────────────
function generateCodeVerifier() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/[^a-zA-Z0-9]/g, '').slice(0, 43);
}
async function generateCodeChallenge(verifier) {
  const enc = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', enc);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

// ── MAIN APP ─────────────────────────────────────────────
function App() {
  const [cfg, setCfg] = useState(loadConfig);
  const [tab, setTab] = useState('listings');
  const [listings, setListings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [search, setSearch] = useState('');
  const [toast, setToast] = useState('');
  const [editQtys, setEditQtys] = useState({});
  const [shopId, setShopId] = useState(cfg.shopId || '');
  const [bulkRows, setBulkRows] = useState([emptyRow()]);

  function emptyRow() {
    return { id: Date.now() + Math.random(), title: '', price: '', qty: '', sku: '', type: 'physical' };
  }

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(''), 3000);
  }

  // ── OAUTH ────────────────────────────────────────────
  async function startOAuth() {
    const { apiKey } = cfg;
    if (!apiKey) { setError('Enter your API Key first.'); return; }
    const verifier = generateCodeVerifier();
    const challenge = await generateCodeChallenge(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    const redirect = window.location.href.split('?')[0];
    const scopes = 'listings_r listings_w transactions_r';
    const url = `https://www.etsy.com/oauth/connect?response_type=code&redirect_uri=${encodeURIComponent(redirect)}&scope=${encodeURIComponent(scopes)}&client_id=${apiKey}&state=etsy_auth&code_challenge=${challenge}&code_challenge_method=S256`;
    window.location.href = url;
  }

  async function exchangeCode(code) {
    const verifier = sessionStorage.getItem('pkce_verifier');
    const redirect = window.location.href.split('?')[0];
    const res = await fetch('https://api.etsy.com/v3/public/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: cfg.apiKey || loadConfig().apiKey,
        redirect_uri: redirect,
        code,
        code_verifier: verifier,
      })
    });
    const data = await res.json();
    if (data.access_token) {
      const newCfg = { ...loadConfig(), accessToken: data.access_token, refreshToken: data.refresh_token };
      saveConfig(newCfg);
      setCfg(newCfg);
      sessionStorage.removeItem('pkce_verifier');
      window.history.replaceState({}, '', window.location.pathname);
      showToast('✓ Connected to Etsy!');
    }
  }

  // Handle OAuth redirect
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) exchangeCode(code);
  }, []);

  // ── FETCH LISTINGS ───────────────────────────────────
  async function fetchListings() {
    if (!cfg.accessToken) { setError('Connect to Etsy first.'); return; }
    setLoading(true); setError('');
    try {
      // Get shop ID if not stored
      let sid = cfg.shopId;
      if (!sid) {
        const me = await etsyFetch('/application/users/me', cfg.accessToken);
        const shops = await etsyFetch(`/application/users/${me.user_id}/shops`, cfg.accessToken);
        sid = shops.shop_id;
        const newCfg = { ...cfg, shopId: sid };
        saveConfig(newCfg); setCfg(newCfg); setShopId(sid);
      }
      const data = await etsyFetch(`/application/shops/${sid}/listings/active?limit=100`, cfg.accessToken);
      setListings(data.results || []);
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  }

  useEffect(() => {
    if (cfg.accessToken && tab === 'listings') fetchListings();
  }, [cfg.accessToken, tab]);

  // ── UPDATE QUANTITY ──────────────────────────────────
  async function saveQty(listing) {
    const qty = parseInt(editQtys[listing.listing_id]);
    if (isNaN(qty)) return;
    try {
      await etsyFetch(
        `/application/shops/${cfg.shopId}/listings/${listing.listing_id}/inventory`,
        cfg.accessToken, 'PUT',
        { quantity: qty }
      );
      setListings(prev => prev.map(l =>
        l.listing_id === listing.listing_id ? { ...l, quantity: qty } : l
      ));
      setEditQtys(prev => { const n = {...prev}; delete n[listing.listing_id]; return n; });
      showToast('✓ Quantity updated');
    } catch(e) {
      showToast('✗ ' + e.message);
    }
  }

  // ── EXPORT TO CSV (Google Sheets) ────────────────────
  function exportCSV() {
    const rows = [
      ['Listing ID','Title','Price','Quantity','Status','SKU','URL'],
      ...listings.map(l => [
        l.listing_id,
        `"${(l.title||'').replace(/"/g,'""')}"`,
        ((l.price?.amount||0) / (l.price?.divisor||100)).toFixed(2),
        l.quantity || 0,
        l.state || '',
        l.sku || '',
        `https://www.etsy.com/listing/${l.listing_id}`
      ])
    ];
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `etsy-listings-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showToast('✓ CSV exported — import to Google Sheets!');
  }

  // ── BULK SUBMIT ──────────────────────────────────────
  async function submitBulk() {
    const valid = bulkRows.filter(r => r.title && r.price);
    if (!valid.length) { showToast('Add at least one listing with title + price'); return; }
    if (!cfg.accessToken || !cfg.shopId) { showToast('Connect to Etsy first'); return; }
    setLoading(true);
    let created = 0;
    for (const row of valid) {
      try {
        await etsyFetch(`/application/shops/${cfg.shopId}/listings`, cfg.accessToken, 'POST', {
          title: row.title,
          description: row.title,
          price: parseFloat(row.price),
          quantity: parseInt(row.qty) || 1,
          who_made: 'i_did',
          when_made: '2020_2024',
          taxonomy_id: 1,
          shipping_profile_id: null,
          type: row.type === 'digital' ? 'download' : 'physical',
          sku: row.sku || undefined,
          is_taxable: true,
          is_supply: false,
        });
        created++;
      } catch(e) { console.error(row.title, e.message); }
    }
    setLoading(false);
    showToast(`✓ Created ${created} listing${created!==1?'s':''}`);
    setBulkRows([emptyRow()]);
  }

  const filtered = listings.filter(l =>
    !search || (l.title||'').toLowerCase().includes(search.toLowerCase())
  );

  const isConnected = !!cfg.accessToken;

  // ── SETUP SCREEN ─────────────────────────────────────
  function SetupScreen() {
    const [key, setKey] = useState(cfg.apiKey || '');
    function save() {
      const newCfg = { ...cfg, apiKey: key };
      saveConfig(newCfg); setCfg(newCfg);
    }
    return (
      <div className="setup-screen">
        <div className="setup-icon">🛍️</div>
        <h2>Connect Your Etsy Shop</h2>
        <p>Enter your API key from the Etsy developer portal, then authorize your shop with one click.</p>
        <div className="setup-form">
          <div className="form-group">
            <label className="form-label">API Keystring</label>
            <input className="form-input" value={key}
              onChange={e => setKey(e.target.value)}
              placeholder="yspyf6n6947nnvsozogmenvd"
              spellCheck={false} />
            <div className="form-hint">From etsy.com/developers → your app → Keystring</div>
          </div>
          <div style={{display:'flex',gap:'10px',marginTop:'8px'}}>
            <button className="btn btn-outline" style={{flex:1}} onClick={save}>Save Key</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={() => { save(); startOAuth(); }}>
              Connect to Etsy →
            </button>
          </div>
          {error && <div style={{color:'var(--red)',fontFamily:'var(--mono)',fontSize:'12px',marginTop:'12px'}}>{error}</div>}
        </div>
        <div style={{marginTop:'20px',fontFamily:'var(--mono)',fontSize:'11px',color:'var(--text-muted)',lineHeight:'1.8'}}>
          <strong style={{color:'var(--text-dim)'}}>How OAuth works:</strong><br/>
          Clicking "Connect" opens Etsy's login page. After you approve, it redirects back here and you're in. No passwords stored.
        </div>
      </div>
    );
  }

  // ── LISTINGS TAB ─────────────────────────────────────
  function ListingsTab() {
    return (
      <>
        <div className="stats-row">
          <div className="stat-card">
            <div className="stat-label">Total Listings</div>
            <div className="stat-value">{listings.length}</div>
            <div className="stat-sub">active in shop</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Total Inventory</div>
            <div className="stat-value">{listings.reduce((s,l)=>s+(l.quantity||0),0)}</div>
            <div className="stat-sub">units across all</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Avg Price</div>
            <div className="stat-value">
              ${listings.length ? (listings.reduce((s,l)=>s+((l.price?.amount||0)/(l.price?.divisor||100)),0)/listings.length).toFixed(2) : '0.00'}
            </div>
            <div className="stat-sub">per listing</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Low Stock</div>
            <div className="stat-value" style={{color:'var(--yellow)'}}>
              {listings.filter(l=>(l.quantity||0)<3).length}
            </div>
            <div className="stat-sub">under 3 units</div>
          </div>
        </div>

        <div className="toolbar">
          <input className="search-box" placeholder="Search listings..."
            value={search} onChange={e => setSearch(e.target.value)} />
          <button className="btn btn-outline" onClick={fetchListings}>↻ Refresh</button>
          <button className="btn btn-green" onClick={exportCSV}>↓ Export CSV</button>
        </div>

        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Listing</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {loading ? (
                <tr className="loading-row">
                  <td colSpan="5"><span className="spinner"></span>Loading listings...</td>
                </tr>
              ) : filtered.length === 0 ? (
                <tr>
                  <td colSpan="5">
                    <div className="empty-state">
                      <div className="icon">📦</div>
                      <p>{listings.length === 0 ? 'No listings loaded yet.\nClick Refresh to fetch your shop.' : 'No listings match your search.'}</p>
                    </div>
                  </td>
                </tr>
              ) : filtered.map(l => {
                const price = ((l.price?.amount||0) / (l.price?.divisor||100)).toFixed(2);
                const qty = editQtys[l.listing_id] !== undefined ? editQtys[l.listing_id] : (l.quantity || 0);
                const isDirty = editQtys[l.listing_id] !== undefined;
                return (
                  <tr key={l.listing_id}>
                    <td>
                      <div className="listing-title">{l.title}</div>
                      <div className="listing-id">#{l.listing_id}</div>
                    </td>
                    <td><span className="price">${price}</span></td>
                    <td>
                      <input className="qty-input" type="number" min="0"
                        value={qty}
                        onChange={e => setEditQtys(prev => ({...prev, [l.listing_id]: e.target.value}))} />
                    </td>
                    <td>
                      <span className={`badge badge-${l.state === 'active' ? 'active' : l.state === 'draft' ? 'draft' : 'inactive'}`}>
                        {l.state || 'active'}
                      </span>
                    </td>
                    <td>
                      <div style={{display:'flex',gap:'6px'}}>
                        {isDirty && (
                          <button className="btn btn-green btn-sm" onClick={() => saveQty(l)}>Save</button>
                        )}
                        <a href={`https://www.etsy.com/listing/${l.listing_id}`} target="_blank"
                          className="btn btn-outline btn-sm" style={{textDecoration:'none'}}>View</a>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </>
    );
  }

  // ── BULK ADD TAB ─────────────────────────────────────
  function BulkAddTab() {
    return (
      <div className="bulk-section">
        <div className="section-title">Bulk Add Listings</div>
        <div className="info-box">
          Fill in as many rows as you want, then hit <strong>Submit All</strong>. Each row becomes one Etsy listing.
          Required: <strong>Title</strong> and <strong>Price</strong>.
        </div>

        <div className="bulk-row" style={{marginBottom:'4px'}}>
          <div className="bulk-row-header">Title *</div>
          <div className="bulk-row-header">Price ($) *</div>
          <div className="bulk-row-header">Quantity</div>
          <div className="bulk-row-header">SKU</div>
          <div></div>
        </div>

        {bulkRows.map((row, i) => (
          <div className="bulk-row" key={row.id}>
            <input className="bulk-input" placeholder="Product title..."
              value={row.title}
              onChange={e => setBulkRows(prev => prev.map((r,j)=>j===i?{...r,title:e.target.value}:r))} />
            <input className="bulk-input" type="number" placeholder="9.99" min="0.20"
              value={row.price}
              onChange={e => setBulkRows(prev => prev.map((r,j)=>j===i?{...r,price:e.target.value}:r))} />
            <input className="bulk-input" type="number" placeholder="1" min="0"
              value={row.qty}
              onChange={e => setBulkRows(prev => prev.map((r,j)=>j===i?{...r,qty:e.target.value}:r))} />
            <input className="bulk-input" placeholder="SKU-001"
              value={row.sku}
              onChange={e => setBulkRows(prev => prev.map((r,j)=>j===i?{...r,sku:e.target.value}:r))} />
            <button className="remove-btn" onClick={() => setBulkRows(prev => prev.filter((_,j)=>j!==i))}>×</button>
          </div>
        ))}

        <div style={{display:'flex',gap:'10px',marginTop:'16px'}}>
          <button className="btn btn-outline" onClick={() => setBulkRows(prev => [...prev, emptyRow()])}>+ Add Row</button>
          <button className="btn btn-primary" onClick={submitBulk} disabled={loading}>
            {loading ? 'Creating...' : `Submit All (${bulkRows.filter(r=>r.title&&r.price).length} ready)`}
          </button>
        </div>

        <div style={{marginTop:'28px',padding:'20px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'8px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--text-muted)',letterSpacing:'1px',marginBottom:'10px'}}>
            CSV IMPORT (PASTE FROM GOOGLE SHEETS)
          </div>
          <p style={{fontSize:'13px',color:'var(--text-dim)',lineHeight:'1.7'}}>
            Paste CSV rows here (title, price, qty, sku) and click Parse.
          </p>
          <textarea
            style={{width:'100%',marginTop:'10px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'6px',padding:'10px',fontFamily:'var(--mono)',fontSize:'12px',color:'var(--text)',outline:'none',minHeight:'80px',resize:'vertical'}}
            placeholder={"Blue Ceramic Mug,12.99,5,MUG-001\nSilk Scrunchie,4.50,20,SCR-002"}
            onBlur={e => {
              const lines = e.target.value.trim().split('\n').filter(Boolean);
              const rows = lines.map(line => {
                const [title='',price='',qty='',sku=''] = line.split(',').map(s=>s.trim());
                return {...emptyRow(),title,price,qty,sku};
              });
              if (rows.length) setBulkRows(rows);
            }}
          />
        </div>
      </div>
    );
  }

  // ── SETTINGS TAB ─────────────────────────────────────
  function SettingsTab() {
    const [key, setKey] = useState(cfg.apiKey || '');
    function save() {
      const newCfg = { ...cfg, apiKey: key };
      saveConfig(newCfg); setCfg(newCfg);
      showToast('✓ Settings saved');
    }
    function disconnect() {
      const newCfg = { apiKey: cfg.apiKey };
      saveConfig(newCfg); setCfg(newCfg);
      setListings([]);
      showToast('Disconnected from Etsy');
    }
    return (
      <div style={{maxWidth:'480px'}}>
        <div className="section-title">Settings</div>
        <div className="setup-form">
          <div className="form-group">
            <label className="form-label">API Keystring</label>
            <input className="form-input" value={key} onChange={e => setKey(e.target.value)} spellCheck={false}/>
          </div>
          <div className="form-group">
            <label className="form-label">Access Token</label>
            <input className="form-input" value={cfg.accessToken ? '••••••••••••••••' : 'Not connected'} readOnly
              style={{opacity:0.6,cursor:'default'}}/>
            <div className="form-hint">{cfg.accessToken ? '✓ Connected' : 'Not connected — use Connect button'}</div>
          </div>
          <div style={{display:'flex',gap:'10px',marginTop:'8px'}}>
            <button className="btn btn-outline" style={{flex:1}} onClick={save}>Save</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={startOAuth}>Re-connect Etsy</button>
          </div>
          {cfg.accessToken && (
            <button className="btn btn-outline" style={{width:'100%',marginTop:'10px',color:'var(--red)',borderColor:'var(--red)'}} onClick={disconnect}>
              Disconnect
            </button>
          )}
        </div>
      </div>
    );
  }

  // ── RENDER ────────────────────────────────────────────
  return (
    <>
      <header className="header">
        <div className="logo">
          <span className="logo-badge">ETSY</span>
          Manager Pro
        </div>
        <div className="header-right">
          {isConnected && <div className="status-dot" />}
          <span className="status-text">{isConnected ? 'CONNECTED' : 'NOT CONNECTED'}</span>
          {!isConnected && (
            <button className="btn btn-primary btn-sm" onClick={() => setTab('settings')}>Connect →</button>
          )}
        </div>
      </header>

      <nav className="nav">
        {[['listings','📦 Listings'],['bulk','➕ Bulk Add'],['settings','⚙️ Settings']].map(([id,label]) => (
          <button key={id} className={`nav-tab ${tab===id?'active':''}`} onClick={() => setTab(id)}>{label}</button>
        ))}
      </nav>

      <main className="main">
        {!isConnected && tab !== 'settings' ? (
          <SetupScreen />
        ) : tab === 'listings' ? (
          <ListingsTab />
        ) : tab === 'bulk' ? (
          <BulkAddTab />
        ) : (
          <SettingsTab />
        )}
      </main>

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
