<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Etsy Manager Pro - Analytics & Optimization</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/recharts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --etsy: #F1641E; --etsy-dim: rgba(241,100,30,0.15);
    --green: #3ddc84; --green-dim: rgba(61,220,132,0.12); --red: #ff5555; --red-dim: rgba(255,85,85,0.12);
    --yellow: #f5c842; --blue: #3b82f6; --purple: #a855f7;
    --text: #f0ede8; --text-muted: #666; --text-dim: #999;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  html { background: var(--bg); }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(241,100,30,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(241,100,30,0.02) 1px, transparent 1px);
    background-size: 50px 50px; pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; border-bottom: 1px solid var(--border);
    background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
  .logo-badge { background: var(--etsy); color: white; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-email { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
  .nav { display: flex; gap: 2px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .nav-tab {
    padding: 10px 18px; font-family: var(--sans); font-weight: 600; font-size: 13px;
    letter-spacing: 0.5px; color: var(--text-muted); cursor: pointer; border: none;
    background: transparent; border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.15s; text-transform: uppercase; white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text-dim); }
  .nav-tab.active { color: var(--etsy); border-bottom-color: var(--etsy); }
  .main { padding: 28px 32px; max-width: 1600px; margin: 0 auto; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; overflow: hidden; transition: all 0.2s; }
  .kpi-card::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background: linear-gradient(90deg, var(--etsy), transparent); opacity:0.8; }
  .kpi-card:hover { border-color: var(--etsy); }
  .kpi-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .kpi-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .kpi-change { font-family: var(--mono); font-size: 12px; color: var(--green); margin-top: 6px; }
  .kpi-change.negative { color: var(--red); }
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 24px; }
  .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; margin-bottom: 24px; }
  .list-container { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 16px; padding: 16px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
  .list-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: all 0.15s; }
  .list-row:hover { background: rgba(241,100,30,0.04); }
  .list-row:last-child { border-bottom: none; }
  .list-title { font-weight: 600; font-size: 13px; }
  .list-stat { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; background: var(--etsy-dim); color: var(--etsy); }
  .badge.green { background: var(--green-dim); color: var(--green); }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-box:focus { border-color: var(--etsy); }
  .search-box::placeholder { color: var(--text-muted); }
  .btn { padding: 10px 18px; border-radius: 6px; font-family: var(--sans); font-weight: 700; font-size: 12px; letter-spacing: 0.5px; cursor: pointer; border: none; transition: all 0.15s; text-transform: uppercase; white-space: nowrap; }
  .btn-primary { background: var(--etsy); color: white; }
  .btn-primary:hover { background: #d4551a; }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-outline:hover { border-color: var(--etsy); color: var(--etsy); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface); border-color: var(--etsy); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px; font-size: 13px; font-family: var(--mono); max-width: 320px; z-index: 1000; animation: slideIn 0.2s; }
  @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .form-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--etsy); }
  .auth-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-box { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; }
  .auth-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .auth-subtitle { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 32px; }
  .tab-buttons { display: flex; gap: 8px; margin-bottom: 28px; }
  .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-family: var(--sans); font-weight: 700; font-size: 13px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s; background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--etsy); color: white; }
  .form-fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
  .rating { font-family: var(--mono); font-size: 12px; color: var(--green); font-weight: 600; }
  .chart-placeholder { display: flex; align-items: center; justify-content: center; height: 300px; background: var(--surface2); border-radius: 8px; color: var(--text-muted); font-family: var(--mono); font-size: 13px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; font-family: var(--mono); font-size: 11px; margin-right: 6px; margin-bottom: 6px; }
  @media (max-width: 768px) {
    .header { padding: 14px 16px; }
    .main { padding: 16px; }
    .kpi-row { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .list-header, .list-row { grid-template-columns: 1fr; gap: 8px; }
    .nav { padding: 12px 16px 0; }
    .nav-tab { padding: 8px 14px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = 'etsy_mgr_v2';
const ETSY_API_KEY = 'yspyf6n6947nnvsozogmenvd';

function generateMockData() {
  const days = 30;
  const data = [];
  for (let i = 0; i < days; i++) {
    data.push({
      date: new Date(Date.now() - (days - i) * 86400000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      revenue: Math.floor(Math.random() * 2000) + 500,
      orders: Math.floor(Math.random() * 15) + 2,
      views: Math.floor(Math.random() * 500) + 100,
    });
  }
  return data;
}

function generateListings() {
  return [
    { id: 1, title: 'Digital Art Print Collection', revenue: 3240, orders: 54, views: 1230, rating: 4.8 },
    { id: 2, title: 'Logo Design Template Bundle', revenue: 2890, orders: 42, views: 950, rating: 4.9 },
    { id: 3, title: 'Social Media Icons Pack', revenue: 2450, orders: 38, views: 820, rating: 4.7 },
    { id: 4, title: 'WordPress Theme Package', revenue: 1890, orders: 28, views: 680, rating: 4.6 },
    { id: 5, title: 'Photo Editing Presets', revenue: 1450, orders: 22, views: 520, rating: 4.8 },
  ];
}

function App() {
  const [user, setUser] = useState(() => {
    const saved = localStorage.getItem('etsy_user');
    return saved ? JSON.parse(saved) : null;
  });
  const [authMode, setAuthMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [authLoading, setAuthLoading] = useState(false);
  const [tab, setTab] = useState('analytics');
  const [cfg, setCfg] = useState(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : { accessToken: null };
  });
  const [toast, setToast] = useState('');
  const [loading, setLoading] = useState(false);
  const [listings, setListings] = useState([]);
  const [analytics, setAnalytics] = useState(generateMockData());
  const [topListings, setTopListings] = useState(generateListings());

  const isConnected = !!cfg.accessToken;

  function showToast(m) { setToast(m); setTimeout(() => setToast(''), 3500); }

  function saveCfg(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }

  async function handleLogin() {
    if (!email || !password) { showToast('Enter email and password'); return; }
    setAuthLoading(true);
    try {
      const r = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'login', email, password })
      });
      const data = await r.json();
      if (r.ok && data.user) {
        localStorage.setItem('etsy_user', JSON.stringify(data.user));
        setUser(data.user);
        setEmail('');
        setPassword('');
        showToast('Logged in successfully');
      } else {
        showToast(data.error || 'Login failed');
      }
    } catch (e) { showToast(e.message); }
    setAuthLoading(false);
  }

  async function handleSignup() {
    if (!email || !password) { showToast('Enter email and password'); return; }
    if (password.length < 6) { showToast('Password must be 6+ characters'); return; }
    setAuthLoading(true);
    try {
      const r = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: 'signup', email, password })
      });
      const data = await r.json();
      if (r.ok && data.user) {
        localStorage.setItem('etsy_user', JSON.stringify(data.user));
        setUser(data.user);
        setEmail('');
        setPassword('');
        showToast('Account created successfully');
      } else {
        showToast(data.error || 'Signup failed');
      }
    } catch (e) { showToast(e.message); }
    setAuthLoading(false);
  }

  function handleLogout() {
    localStorage.removeItem('etsy_user');
    setUser(null);
    setCfg({});
    saveCfg({});
    showToast('Logged out');
  }

  async function startOAuth() {
    const v = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    sessionStorage.setItem('pkce_v', v);
    const redirect = window.location.origin + window.location.pathname;
    const scopes = 'listings_r listings_w transactions_r';
    window.location.href = `https://www.etsy.com/oauth/connect?response_type=code&redirect_uri=${encodeURIComponent(redirect)}&scope=${encodeURIComponent(scopes)}&client_id=${ETSY_API_KEY}&state=auth&code_challenge=${v}&code_challenge_method=S256`;
  }

  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    const code = p.get('code');
    if (!code) return;
    (async () => {
      try {
        const v = sessionStorage.getItem('pkce_v');
        if (!v) { showToast('Session error'); return; }
        const redirect = window.location.origin + window.location.pathname;
        const r = await fetch('/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, code_verifier: v, redirect_uri: redirect })
        });
        const data = await r.json();
        if (data.access_token) {
          const n = { ...cfg, accessToken: data.access_token, refreshToken: data.refresh_token };
          saveCfg(n);
          setCfg(n);
          sessionStorage.removeItem('pkce_v');
          window.history.replaceState({}, '', window.location.pathname);
          showToast('Connected to Etsy');
        } else {
          showToast(data.error || 'Auth failed');
        }
      } catch (e) { showToast(e.message); }
    })();
  }, []);

  if (!user) {
    return (
      <div className="auth-container">
        <div className="auth-box">
          <div className="auth-title">Etsy Manager Pro</div>
          <div className="auth-subtitle">Manage & optimize your digital store</div>
          <div className="tab-buttons">
            <button className={`tab-btn ${authMode === 'login' ? 'active' : ''}`} onClick={() => setAuthMode('login')}>Sign In</button>
            <button className={`tab-btn ${authMode === 'signup' ? 'active' : ''}`} onClick={() => setAuthMode('signup')}>Sign Up</button>
          </div>
          <div className="form-fields">
            <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && (authMode === 'login' ? handleLogin() : handleSignup())} className="form-input" />
            <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && (authMode === 'login' ? handleLogin() : handleSignup())} className="form-input" />
            <button onClick={() => authMode === 'login' ? handleLogin() : handleSignup()} disabled={authLoading} className="btn btn-primary" style={{ marginTop: '8px' }}>
              {authLoading ? 'Loading...' : (authMode === 'login' ? 'Sign In' : 'Create Account')}
            </button>
          </div>
          {authMode === 'signup' && <div style={{ fontSize: '11px', color: 'var(--text-muted)', textAlign: 'center' }}>Password must be at least 6 characters</div>}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh' }}>
      <header className="header">
        <div className="logo"><span className="logo-badge">ETSY</span> Manager Pro</div>
        <div className="header-right">
          <span className="header-email">{user?.email}</span>
          {isConnected && <div className="status-dot" />}
          <span className="status-text">{isConnected ? 'CONNECTED' : 'NOT CONNECTED'}</span>
          {!isConnected && <button className="btn btn-primary btn-sm" onClick={startOAuth}>Connect Etsy</button>}
          <button className="btn btn-secondary btn-sm" onClick={handleLogout}>Logout</button>
        </div>
      </header>

      <nav className="nav">
        {['analytics', 'pricing', 'seo', 'forecasting', 'customers', 'reports'].map(t => (
          <button key={t} className={`nav-tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
            {t.charAt(0).toUpperCase() + t.slice(1)}
          </button>
        ))}
      </nav>

      <div className="main">
        {tab === 'analytics' && (
          <div>
            <div className="kpi-row">
              <div className="kpi-card">
                <div className="kpi-label">Total Revenue</div>
                <div className="kpi-value">$45,230</div>
                <div className="kpi-change">↑ 12% vs last month</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Total Orders</div>
                <div className="kpi-value">892</div>
                <div className="kpi-change">↑ 8% vs last month</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Conversion Rate</div>
                <div className="kpi-value">3.2%</div>
                <div className="kpi-change">↑ 0.5% vs last month</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Avg Order Value</div>
                <div className="kpi-value">$50.73</div>
                <div className="kpi-change negative">↓ 2% vs last month</div>
              </div>
            </div>

            <div className="chart-container">
              <div className="chart-title">Revenue Trend (30 Days)</div>
              <div className="chart-placeholder">Revenue chart - Recharts integration ready</div>
            </div>

            <div className="grid-2">
              <div className="chart-container">
                <div className="chart-title">Orders by Day</div>
                <div className="chart-placeholder">Orders chart - Recharts integration ready</div>
              </div>
              <div className="chart-container">
                <div className="chart-title">Traffic by Source</div>
                <div style={{ padding: '20px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-around', textAlign: 'center' }}>
                    <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: 'var(--green)' }}>62%</div><div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>DIRECT</div></div>
                    <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: 'var(--blue)' }}>28%</div><div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>SEARCH</div></div>
                    <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: 'var(--purple)' }}>10%</div><div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>SOCIAL</div></div>
                  </div>
                </div>
              </div>
            </div>

            <div className="chart-container">
              <div className="chart-title">Top Performing Products</div>
              <div className="list-container">
                <div className="list-header">
                  <div>Product</div>
                  <div>Revenue</div>
                  <div>Orders</div>
                  <div>Rating</div>
                </div>
                {topListings.map(listing => (
                  <div key={listing.id} className="list-row">
                    <div className="list-title">{listing.title}</div>
                    <div className="list-stat" style={{ color: 'var(--green)' }}>${listing.revenue.toLocaleString()}</div>
                    <div className="list-stat">{listing.orders} sales</div>
                    <div style={{ color: 'var(--yellow)', fontWeight: 'bold' }}>★ {listing.rating}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab === 'pricing' && (
          <div>
            <h2 style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '20px' }}>Smart Pricing Engine</h2>
            <div className="kpi-row">
              <div className="kpi-card">
                <div className="kpi-label">Avg Price</div>
                <div className="kpi-value">$45.99</div>
                <div className="kpi-change">Market avg: $48.50</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Price Elasticity</div>
                <div className="kpi-value">-1.2</div>
                <div className="kpi-change">Moderate sensitivity</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Revenue Potential</div>
                <div className="kpi-value">+$3,600</div>
                <div className="kpi-change">With 8% increase</div>
              </div>
              <div className="kpi-card">
                <div className="kpi-label">Active Campaigns</div>
                <div className="kpi-value">2</div>
                <div className="kpi-change">1 discount, 1 bundle</div>
              </div>
            </div>

            <div className="toolbar">
              <input type="text" placeholder="Search campaigns..." className="search-box" />
              <button className="btn btn-primary">+ New Campaign</button>
            </div>

            <div className="grid-2">
              <div className="chart-container">
                <div className="chart-title">Discount Campaigns</div>
                <div className="list-container">
                  <div className="list-header">
                    <div>Campaign</div>
                    <div>Discount</div>
                    <div>Active</div>
                    <div>Impact</div>
                  </div>
                  <div className="list-row">

}
